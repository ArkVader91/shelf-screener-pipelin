name: Debug agent on review feedback

# Stage 4+5 of the feedback loop (design doc section 3.4/3.5). Triggered when a
# human pushes filled-in labels.csv or missed_signals/**/notes.csv. Computes
# precision for the affected batch and, if any screener is below the 80% gate
# (or has a missed-signal report, which is its own trigger regardless of the
# gate), runs the LangGraph debug agent to diagnose, patch, and validate a fix,
# opening a PR for manual review. The agent never merges its own PRs.

on:
  push:
    branches: [main]
    paths:
      - "review_batches/**/labels.csv"
      - "missed_signals/**/notes.csv"
  workflow_dispatch:
    inputs:
      date:
        description: "Batch date to evaluate (YYYY-MM-DD). Leave blank for the most recent batch."
        required: false
      screener:
        description: "Restrict to one screener (HOLD/FLEX/STRICT). Leave blank to auto-detect."
        required: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: debug-agent
  cancel-in-progress: false

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve batch date
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            latest=$(ls -1 review_batches | sort | tail -n 1)
            echo "date=$latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute accuracy (precision gate)
        if: hashFiles(format('review_batches/{0}/labels.csv', steps.vars.outputs.date)) != ''
        run: python pipeline/compute_accuracy.py --date "${{ steps.vars.outputs.date }}"

      - name: Commit accuracy.json
        run: |
          git config user.name "shelf-screener-bot"
          git config user.email "actions@users.noreply.github.com"
          git add review_batches/"${{ steps.vars.outputs.date }}"/accuracy.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "accuracy: ${{ steps.vars.outputs.date }}"
            git push
          fi

      - name: Run debug agent
        env:
          SCREENER_INPUT: ${{ github.event.inputs.screener }}
        run: |
          if [ -n "$SCREENER_INPUT" ]; then
            python agent/debug_agent.py --date "${{ steps.vars.outputs.date }}" --screener "$SCREENER_INPUT"
          else
            python agent/debug_agent.py --date "${{ steps.vars.outputs.date }}"
          fi
